<!-- Topbar template — displays navigation and logout -->

<nav class="topbar">
  
  <!-- Brand section — app name/logo -->
  <div class="brand">
    <span class="brand-badge"></span>
    <span class="brand-name">Hold my Beer.</span>
  </div>

  <!-- Navigation links — route to main pages -->
  <div class="nav-links">
    <a routerLink="/journal" routerLinkActive="active" class="nav-link">My Journal</a>
    <a routerLink="/map" routerLinkActive="active" class="nav-link">Map</a>
    <a routerLink="/settings" routerLinkActive="active" class="nav-link">Settings</a>
  </div>

  <!-- Actions section — contains logout button -->
  <div class="nav-actions">
    <!-- Calls logout() in Topbar component -->
    <button class="btn-logout" (click)="logout()">Log out</button>
  </div>

</nav>
