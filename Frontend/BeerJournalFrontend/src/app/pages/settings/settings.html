<!-- Settings page — lets the user update their profile or delete their account -->

<div class="page">

  <!-- Page header: title and subtitle -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Settings</h1>
      <p class="page-sub">Manage your account</p>
    </div>
  </div>

  <!-- Profile section — update first name, last name and email -->
  <div class="settings-card">
    <h2 class="section-title">Profile</h2>

    <!-- First and last name on the same row -->
    <div class="row-2">
      <div class="field">
        <label>FIRST NAME</label>
        <input type="text" [(ngModel)]="firstName" name="firstName" placeholder="Your first name"/>
      </div>
      <div class="field">
        <label>LAST NAME</label>
        <input type="text" [(ngModel)]="lastName" name="lastName" placeholder="Your last name"/>
      </div>
    </div>

    <div class="field">
      <label>EMAIL</label>
      <input type="email" [(ngModel)]="email" name="email" placeholder="Your email"/>
    </div>

    <!-- Save button — calls updateUser() in settings.ts -->
    <button class="btn-primary" (click)="updateUser()">
      Save changes
    </button>

    <!-- Success / error messages — only shown if there's something to display -->
    <p *ngIf="message" class="success-message">{{ message }}</p>
    <p *ngIf="error" class="error-message">{{ error }}</p>
  </div>

  <!-- Danger zone — separate card for the destructive action -->
  <div class="settings-card danger-zone">
    <h2 class="section-title">Danger zone</h2>
    <p class="danger-text">Once you delete your account all your data will be permanently removed.</p>

    <!-- Delete button — calls deleteUser() which asks for confirmation first -->
    <button class="btn-danger" (click)="deleteUser()">
      Delete account
    </button>
  </div>

</div>
