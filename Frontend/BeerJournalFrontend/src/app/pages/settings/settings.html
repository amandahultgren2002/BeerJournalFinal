<div class="page">

  <div class="page-header">
    <div>
      <h1 class="page-title">Settings</h1>
      <p class="page-sub">Manage your account</p>
    </div>
  </div>

  <div class="settings-card">
    <h2 class="section-title">Profile</h2>

    <div class="row-2">
      <div class="field">
        <label>FIRST NAME</label>
        <input type="text" [(ngModel)]="firstName" name="firstName" placeholder="Your first name"/>
      </div>
      <div class="field">
        <label>LAST NAME</label>
        <input type="text" [(ngModel)]="lastName" name="lastName" placeholder="Your last name"/>
      </div>
    </div>

    <div class="field">
      <label>EMAIL</label>
      <input type="email" [(ngModel)]="email" name="email" placeholder="Your email"/>
    </div>

    <button class="btn-primary" (click)="updateUser()">
  Save changes
</button>
<p *ngIf="message" class="success-message">{{ message }}</p>
<p *ngIf="error" class="error-message">{{ error }}</p>

  </div>

  <div class="settings-card danger-zone">
    <h2 class="section-title">Danger zone</h2>
    <p class="danger-text">Once you delete your account all your data will be permanently removed.</p>
    <button class="btn-danger" (click)="deleteUser()">
  Delete account
</button>
  </div>

</div>
