<!-- Map page — shows all logged beers as pins on a map of Copenhagen -->

<div class="page">

  <!-- Page header: title and subtitle -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Beer Map</h1>
      <p class="page-sub">See where you've logged your beers</p>
    </div>
  </div>

  <!-- Map container — Leaflet attaches the map to the #beer-map div -->
  <div class="map-container">
    <div id="beer-map"></div>
  </div>

</div>
